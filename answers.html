<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Supervision 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #222;
    background: #fafafa;
    line-height: 1.6;
  }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }
  h1, h2, h3, h4 { font-weight: 600; line-height: 1.25; margin: 1.6em 0 0.6em; }
  h1 { font-size: 32px; font-weight: 300; margin-top: 0; }
  h2 { font-size: 22px; border-bottom: 1px solid #e2e2e2; padding-bottom: 6px; }
  h3 { font-size: 17px; }
  p, ul, ol { margin: 0 0 1em; }
  img { max-width: 100%; height: auto; display: block; margin: 1em 0; border-radius: 4px; }
  code {
    background: #eef0f2;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.92em;
    word-break: break-all;
  }
  pre {
    background: #1f2329;
    color: #e6e6e6;
    padding: 14px 16px;
    border-radius: 4px;
    overflow-x: auto;
  }
  pre code { background: transparent; padding: 0; color: inherit; word-break: normal; }
  a { color: #115868; }
  blockquote {
    border-left: 3px solid #c8c8c8;
    margin: 0 0 1em;
    padding: 2px 14px;
    color: #555;
  }
  hr { border: 0; border-top: 1px solid #ddd; margin: 2em 0; }
  .image-placeholder {
    display: inline-block;
    background: #f0e4c8;
    border: 1px dashed #b89c4a;
    color: #6b561e;
    padding: 4px 10px;
    border-radius: 4px;
    font-style: italic;
    font-size: 0.92em;
  }
  .captured {
    background: #fff4d6;
    border: 1px solid #e6c86a;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  .empty {
    color: #999;
    font-style: italic;
  }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
</style>
</head>
<body>
<main id="content">Loading…</main>
<script>
  (function () {
    var raw = (window.location.hash || '').replace(/^#/, '');
    var password = '';
    try { password = decodeURIComponent(raw); } catch (e) { password = raw; }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }

    var pwHtml = password
      ? '<span class="captured">' + escapeHtml(password) + '</span>'
      : '<span class="empty">(no password captured)</span>';

    function render(md) {
      md = md.replace(/!\[\[([^\]]+)\]\]/g, function (_, name) {
        return '<span class="image-placeholder">[Image: ' + escapeHtml(name) + ']</span>';
      });

      md = md.split('{{PASSWORD}}').join(pwHtml);

      md = md.replace(/\\\$/g, '<span class="no-katex">$</span>');

      var math = [];
      md = md.replace(/\$\$([\s\S]+?)\$\$/g, function (m) {
        math.push(m); return '@@MATH' + (math.length - 1) + '@@';
      });
      md = md.replace(/\$([^\$\n]+?)\$/g, function (m) {
        math.push(m); return '@@MATH' + (math.length - 1) + '@@';
      });

      var html = marked.parse(md);

      html = html.replace(/@@MATH(\d+)@@/g, function (_, i) { return math[+i]; });

      var el = document.getElementById('content');
      el.innerHTML = html;

      if (window.renderMathInElement) {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true }
          ],
          throwOnError: false,
          ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'option'],
          ignoredClasses: ['no-katex']
        });
      }
    }

    fetch('answers.md', { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('Could not load answers.md (' + r.status + ')');
        return r.text();
      })
      .then(render)
      .catch(function (err) {
        document.getElementById('content').innerHTML =
          '<h1>Couldn’t load answers.md</h1><p>' + escapeHtml(err.message) + '</p>' +
          '<p>If you opened this directly from disk, your browser may block <code>fetch</code> on <code>file://</code>. Host it (GitHub Pages, Vercel, or <code>python3 -m http.server</code>) and reload.</p>';
      });
  })();
</script>
</body>
</html>
